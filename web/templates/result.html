<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Interleave Result</title>
    <style>
        :root {
            --bg: #f2f6f7;
            --ink: #1f2d3a;
            --accent: #176b5a;
            --accent-2: #227ea0;
            --panel: #ffffff;
            --line: #d2dde2;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Trebuchet MS", "Gill Sans", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 8% 8%, #d8efdc 0%, transparent 35%),
                radial-gradient(circle at 94% 18%, #d8eaf5 0%, transparent 34%),
                var(--bg);
        }
        .card {
            width: min(640px, 100%);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 14px 30px rgba(31, 45, 58, 0.11);
            animation: pop-in 220ms ease-out;
        }
        h1 {
            margin: 0;
            font-family: "Palatino Linotype", "Book Antiqua", serif;
            font-size: 1.7rem;
        }
        .meta {
            margin-top: 10px;
            color: #4f616d;
            line-height: 1.5;
        }
        a.btn {
            display: inline-block;
            margin-top: 16px;
            border-radius: 12px;
            padding: 11px 16px;
            color: #fff;
            text-decoration: none;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            font-weight: 600;
            box-shadow: 0 10px 18px rgba(34, 126, 160, 0.24);
        }
        a.secondary {
            margin-left: 10px;
            color: #325367;
            text-decoration: none;
            font-weight: 600;
        }
        code {
            background: #eef5f8;
            border: 1px solid #d4e0e6;
            border-radius: 7px;
            padding: 2px 6px;
        }
        @keyframes pop-in {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
<main class="card">
    <h1>Merged PDF Ready</h1>
    <div class="meta">
        Size: {{ size_kb }} KB<br>
        Expires at: {{ expires_at }}<br>
        {% if one_shot %}
        Link policy: one-shot download enabled.
        {% else %}
        Link policy: reusable until expiration.
        {% endif %}
    </div>
    <a class="btn" href="{{ download_url }}">Download PDF</a>
    <a class="secondary" href="/">Back</a>
    <div class="meta" style="margin-top:14px;">
        Token: <code>{{ token }}</code>
    </div>
</main>
</body>
</html>
